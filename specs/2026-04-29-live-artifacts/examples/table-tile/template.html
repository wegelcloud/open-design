<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{data.title}}</title>
  </head>
  <body>
    <main>
      <h1>{{data.title}}</h1>
      <table>
        <thead>
          <tr>
            <th>Component</th>
            <th>Coverage</th>
            <th>Owner</th>
          </tr>
        </thead>
        <tbody>
          <tr data-od-repeat="row in data.rows">
            <td>{{row.component}}</td>
            <td>{{row.coverage}}</td>
            <td>{{row.owner}}</td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
